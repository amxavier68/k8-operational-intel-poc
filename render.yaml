services:
  - type: web
    name: k8-poc-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /k8-health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
